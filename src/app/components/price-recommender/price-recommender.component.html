<div class="recommender-card">
  <h3>Latest Local Fuel Prices</h3>
  
  @for (station of fuelService.stations(); track station._id) {
    <div class="station-item">
      <span>{{ station.name }}</span>: 
      <strong>₱{{ station.price }}</strong>
    </div>
  } @empty {
    <p>Loading latest prices from API...</p>
  }
</div>
