<div class="card">
      <h3>Add New Fuel Log</h3>
      <input [(ngModel)]="entry.stationName" placeholder="Gas Station Name">
      <input [(ngModel)]="entry.liters" type="number" placeholder="Liters">
      <input [(ngModel)]="entry.cost" type="number" placeholder="Cost">
      <button (click)="save()">Show Result</button>
    </div>
